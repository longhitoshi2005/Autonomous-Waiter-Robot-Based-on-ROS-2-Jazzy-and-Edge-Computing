slam_toolbox:
  ros__parameters:
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan
    use_sim_time: true
    mode: mapping

    # Thông số ép vẽ map nhanh
    minimum_travel_distance: 0.01
    minimum_travel_heading: 0.01
    map_update_interval: 1.0
    
    max_laser_range: 12.0
    min_laser_range: 0.15
    resolution: 0.05